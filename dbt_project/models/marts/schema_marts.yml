# =============================================================================
# Marts Schema - Training & Race Performance
# =============================================================================
# Gold layer marts for training analysis and race performance.
#
# Syntax note (dbt 1.9+):
# - Use `data_tests:` instead of `tests:` at column level
# - Use `arguments:` to nest values/config inside generic tests
# =============================================================================

version: 2

models:
  # ---------------------------------------------------------------------------
  # Model: mart_training_summary
  # ---------------------------------------------------------------------------
  - name: mart_training_summary
    description: |
      Weekly training summary with aggregated metrics and rolling averages.

      **Grain**: One row per week (Monday to Sunday)

      **Purpose**: 
      - Track training volume and consistency over time
      - Monitor rolling averages to identify trends
      - Compare current week to historical performance
      - Analyze heart rate zone distribution
      - Assess training load progression

      **Business Logic**:
      - Week starts on Monday (ISO 8601 standard)
      - Rolling averages use current week + N-1 previous weeks
      - Percentage changes compare current week to comparison period
      - Pace is distance-weighted average (longer runs have more influence)
      - Heart rate zones show percentage of activities in each zone

      **Use Cases**:
      - Streamlit dashboard: Training volume trends chart
      - AI Coach: Context for training recommendations
      - Injury prevention: Detect rapid load increases
      - Performance analysis: Identify training peaks/tapers

    columns:
      # Dimensions
      - name: week_start_date
        description: |
          Monday of the week (ISO 8601 week start).
          This is the primary key for the mart.
        data_tests:
          - unique
          - not_null

      - name: year
        description: Calendar year of the week
        data_tests:
          - not_null

      - name: week_number
        description: |
          Week number of the year (1-53).
          Follows ISO 8601 week numbering.
        data_tests:
          - not_null

      - name: week_label
        description: |
          Human-readable week label (e.g., "Week 7, 2026").
          Useful for chart labels and display.
        data_tests:
          - not_null

      # Weekly Totals
      - name: total_activities
        description: |
          Total number of running activities during the week.
          Includes all activity types (training runs, races, recovery runs).
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: total_races
        description: Number of races run during the week (subset of total_activities)
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: total_distance_km
        description: |
          Sum of all running distances for the week (kilometers).
          Key metric for training volume.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300

      - name: avg_distance_per_activity_km
        description: Average distance per activity (total_distance / total_activities)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 50

      - name: max_distance_km
        description: Longest run of the week
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 50

      - name: total_duration_minutes
        description: Sum of all activity durations for the week (minutes)
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1800

      - name: avg_duration_per_activity_minutes
        description: Average duration per activity
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300

      # Pace & Heart Rate
      - name: avg_pace_min_per_km
        description: |
          Distance-weighted average pace for the week (min/km).
          Formula: sum(pace * distance) / sum(distance)
          This gives more weight to longer runs.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 3.0
                max_value: 15.0

      - name: avg_heart_rate_bpm
        description: |
          Average heart rate across all activities with HR data.
          Null if no activities had HR data this week.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 100
                max_value: 200

      - name: max_heart_rate_bpm
        description: Highest recorded heart rate during the week
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 100
                max_value: 220

      # Elevation
      - name: total_elevation_gain_m
        description: Sum of elevation gain for all activities (meters)
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: avg_elevation_per_activity_m
        description: Average elevation gain per activity
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2000

      # Effort & Training Load
      - name: avg_effort_level
        description: |
          Average effort level for the week (1-10 scale).
          Based on pace zone classification.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 10

      - name: total_training_load
        description: |
          Sum of training load scores for the week.
          Higher values = higher training stress.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      # Heart Rate Zone Distribution (as percentages)
      - name: pct_zone1_easy
        description: Percentage of activities in Zone 1 (Easy, <70% max HR)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      - name: pct_zone2_moderate
        description: Percentage of activities in Zone 2 (Moderate, 70-80% max HR)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      - name: pct_zone3_tempo
        description: Percentage of activities in Zone 3 (Tempo, 80-87% max HR)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      - name: pct_zone4_threshold
        description: Percentage of activities in Zone 4 (Threshold, 87-93% max HR)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      - name: pct_zone5_max
        description: Percentage of activities in Zone 5 (Max, >93% max HR)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      # 4-Week Rolling Averages
      - name: rolling_4wk_avg_distance_km
        description: |
          4-week rolling average of weekly distance (current + 3 previous weeks).
          Smooths out week-to-week variations to show true trend.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300

      - name: rolling_4wk_avg_activities
        description: 4-week rolling average of activities per week
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 20

      - name: rolling_4wk_avg_duration_minutes
        description: 4-week rolling average of total weekly duration
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1800

      - name: rolling_4wk_avg_training_load
        description: 4-week rolling average of training load
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      # 8-Week Rolling Averages
      - name: rolling_8wk_avg_distance_km
        description: |
          8-week rolling average of weekly distance.
          Provides longer-term trend perspective.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300

      - name: rolling_8wk_avg_activities
        description: 8-week rolling average of activities per week
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 20

      - name: rolling_8wk_avg_duration_minutes
        description: 8-week rolling average of total weekly duration
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1800

      - name: rolling_8wk_avg_training_load
        description: 8-week rolling average of training load
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      # Comparison Metrics
      - name: distance_vs_prev_week_pct
        description: |
          Percentage change in distance vs previous week.
          Positive = increased distance, Negative = decreased distance.
          Null for first week of data.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -100
                max_value: 500

      - name: activities_vs_prev_week_pct
        description: |
          Percentage change in activity count vs previous week.
          Null for first week of data.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -100
                max_value: 500

      - name: distance_vs_4wk_avg_pct
        description: |
          Percentage change vs 4-week rolling average.
          Helps identify if current week is above/below recent trend.
          Important for injury risk assessment (rapid increases are risky).
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -100
                max_value: 500

      # Trend Indicators
      - name: distance_trend_4wk
        description: |
          Simple trend classification: 'Increasing', 'Decreasing', or 'Stable'.
          Compares current week to 4-week average.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Increasing", "Decreasing", "Stable"]

      - name: training_load_trend_4wk
        description: |
          Training load trend classification: 'Increasing', 'Decreasing', or 'Stable'.
          Compares current week to 4-week average.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Increasing", "Decreasing", "Stable"]

  # ---------------------------------------------------------------------------
  # Model: mart_race_performance
  # ---------------------------------------------------------------------------
  - name: mart_race_performance
    description: |
      Race-specific performance analysis with PR tracking and trends.

      **Grain**: One row per race

      **Purpose**:
      - Track personal records (PRs) for each distance
      - Analyze race performance vs training pace
      - Monitor performance trends over time
      - Assess race readiness and recovery

      **Business Logic**:
      - PR = fastest time for each distance category
      - Training context = 30 days before race
      - Race readiness based on training volume + recovery
      - Performance rating based on % off PR

      **Use Cases**:
      - Race calendar and results tracking
      - PR progression analysis
      - Race pacing strategy evaluation
      - Training effectiveness assessment

    columns:
      # Identifiers
      - name: race_id
        description: Unique race identifier (same as activity_id)
        data_tests:
          - unique
          - not_null

      - name: race_date
        description: Date of the race
        data_tests:
          - not_null

      - name: race_year
        description: Year of the race
        data_tests:
          - not_null

      - name: race_season
        description: Season when race occurred (Spring/Summer/Fall/Winter)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Spring", "Summer", "Fall", "Winter"]

      # Race Details
      - name: race_distance_category
        description: Standardized race distance (5K, 10K, Half Marathon, Marathon, Ultra)
        data_tests:
          - accepted_values:
              arguments:
                values: ["5K", "10K", "Half Marathon", "Marathon", "Ultra"]

      - name: distance_km
        description: Actual race distance in kilometers
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 3.0
                max_value: 100.0

      - name: duration_minutes
        description: Race finish time in minutes
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 10.0
                max_value: 600.0

      - name: pace_min_per_km
        description: Average race pace (min/km)
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 3.0
                max_value: 10.0

      # Performance Metrics
      - name: is_personal_record
        description: True if this race set a PR for this distance
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: pr_pace_min_per_km
        description: Current PR pace for this distance category
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 3.0
                max_value: 10.0

      - name: minutes_off_pr
        description: |
          How many minutes slower than PR.
          0.0 if this IS the PR, positive if slower.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.0
                max_value: 120.0

      - name: pct_off_pr
        description: Percentage slower than PR (0% if this is the PR)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.0
                max_value: 100.0

      - name: performance_rating
        description: |
          Overall performance classification:
          - PR: Personal record
          - Near PR: Within 5% of PR
          - Good: Within 10% of PR
          - Fair: Within 20% of PR
          - Off Day: More than 20% off PR
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["PR", "Near PR", "Good", "Fair", "Off Day"]

      # Training Context
      - name: avg_training_pace_30d
        description: Average training pace in 30 days before race
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 3.0
                max_value: 15.0

      - name: total_training_distance_30d
        description: Total training distance in 30 days before race (km)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.0
                max_value: 500.0

      - name: training_runs_30d
        description: Number of training runs in 30 days before race
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 50

      - name: race_vs_training_pace_diff
        description: |
          Race pace minus training pace (min/km).
          Negative = raced faster than training.
          Positive = raced slower than training.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -5.0
                max_value: 5.0

      - name: race_readiness_score
        description: |
          Race readiness score (1-10) based on:
          - Training volume (30 days)
          - Days since last race
          - Training consistency
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 10

      - name: pacing_assessment
        description: |
          How race pace compared to training:
          - Much faster than training
          - Faster than training
          - Consistent with training
          - Slower than training
          - No training data
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Much faster than training"
                  - "Faster than training"
                  - "Consistent with training"
                  - "Slower than training"
                  - "No training data"

      # Race Intervals & Recovery
      - name: days_since_last_race
        description: |
          Days since previous race.
          Null for first race.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 365

      - name: recovery_status
        description: |
          Recovery assessment:
          - First race: No previous race
          - Quick turnaround: < 7 days
          - Standard recovery: 7-14 days
          - Well rested: > 14 days
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "First race"
                  - "Quick turnaround"
                  - "Standard recovery"
                  - "Well rested"

      # Performance Trends
      - name: pace_ma_3_races
        description: |
          3-race moving average pace for this distance.
          Helps identify improving/declining trends.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 3.0
                max_value: 10.0

      - name: pace_change_vs_last_race
        description: |
          Pace change vs previous race at this distance (min/km).
          Negative = faster, Positive = slower.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -3.0
                max_value: 3.0
