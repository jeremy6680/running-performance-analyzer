# =============================================================================
# Staging Models - Schema Documentation & Tests
# =============================================================================
# This file documents all staging models (silver layer) and defines data tests.
#
# Tests ensure data quality:
# - unique: Column has no duplicates
# - not_null: Column has no null values
# - accepted_values: Column only contains specific values
# - relationships: Foreign key integrity
#
# Run tests: dbt test --select staging
#
# Syntax note (dbt 1.9+):
# - Use `data_tests:` instead of `tests:` at column level
# - Use `arguments:` to nest values/config inside generic tests
# =============================================================================

version: 2

models:
  # ---------------------------------------------------------------------------
  # Model: stg_garmin_activities
  # ---------------------------------------------------------------------------
  - name: stg_garmin_activities
    description: >
      Cleaned and standardized Garmin activity data from bronze layer.

      This staging model transforms raw API data into analytics-ready format:
      - Adds calculated fields (pace zones, effort levels, training load)
      - Handles null values and data quality issues
      - Filters out invalid activities (zero distance, very short duration)
      - Categorizes activities (races, terrain, time of day)

      Grain: One row per activity

      Materialization: VIEW (fast to rebuild, feeds marts)

      Upstream: source.garmin.raw_garmin_activities

      Downstream: 
        - mart_training_analysis
        - mart_race_performance

    meta:
      owner: jeremy
      layer: silver
      domain: fitness_activities

    # Model-level tests removed.
    # dbt_utils.expression_is_true runs per-row (WHERE clause) so COUNT(*)
    # is invalid there. Row existence is implied by not_null + unique on
    # activity_id. Re-add if you install dbt-expectations later.

    columns:
      # ===== Identifiers =====
      - name: activity_id
        description: Unique identifier for each activity (from Garmin API)
        data_tests:
          - unique
          - not_null

      - name: activity_name
        description: User-defined name for the activity (can be null)

      # ===== Temporal Fields =====
      - name: activity_date
        description: >
          Date of the activity (DATE type, not timestamp).
          Used for grouping by day/week/month.
        data_tests:
          - not_null

      - name: activity_start_time
        description: Exact start time of activity in local timezone (TIMESTAMP)

      - name: start_hour
        description: Hour of day when activity started (0-23)

      - name: day_of_week
        description: Day of week (0=Sunday, 1=Monday, ..., 6=Saturday)

      # ===== Activity Metadata =====
      - name: activity_type
        description: Type of activity (running, cycling, swimming, etc)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "running"
                  - "cycling"
                  - "swimming"
                  - "walking"
                  - "hiking"
                  - "strength_training"
                  - "yoga"
                  - "other"

      - name: device_name
        description: Garmin device used to record the activity

      - name: location_name
        description: Location or city where activity took place

      # ===== Distance =====
      - name: distance_km
        description: Total distance in kilometers
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                severity: error

      # ===== Duration =====
      - name: duration_minutes
        description: Total duration including pauses (minutes)
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 5"  # Minimum 5 minutes (filtered in model)

      - name: moving_duration_minutes
        description: Active duration excluding pauses (minutes)

      - name: pause_duration_minutes
        description: Time spent paused (total - moving)

      # ===== Speed & Pace =====
      - name: avg_pace_min_km
        description: Average pace in minutes per kilometer

      - name: avg_speed_kmh
        description: Average speed in kilometers per hour

      - name: max_speed_kmh
        description: Maximum speed reached in kilometers per hour

      # ===== Heart Rate =====
      - name: avg_heart_rate
        description: Average heart rate in beats per minute (bpm)

      - name: max_heart_rate
        description: Maximum heart rate reached (bpm)

      - name: hr_delta
        description: Difference between max and average HR (indicates intensity variation)

      # ===== Elevation =====
      - name: elevation_gain_m
        description: Total elevation gain in meters

      - name: elevation_loss_m
        description: Total elevation loss in meters

      - name: net_elevation_m
        description: Net elevation change (gain - loss)

      - name: elevation_range_m
        description: Elevation range (max - min)

      # ===== Training Metrics =====
      - name: calories
        description: Estimated calories burned

      - name: aerobic_training_effect
        description: Garmin's aerobic training effect score (0-5)

      - name: anaerobic_training_effect
        description: Garmin's anaerobic training effect score (0-5)

      - name: total_training_effect
        description: Sum of aerobic and anaerobic training effects

      - name: training_load
        description: >
          Calculated training load (simplified TRIMP).
          Duration × intensity factor based on heart rate.
          Higher = more stressful workout.

      # ===== Cadence =====
      - name: avg_cadence_spm
        description: Average cadence in steps per minute

      - name: max_cadence_spm
        description: Maximum cadence in steps per minute

      # ===== Calculated Fields (Business Logic) =====
      - name: is_race
        description: >
          Boolean flag indicating if this is a race.
          Based on activity name keywords or round distances (5K, 10K, etc).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: race_distance_category
        description: >
          Race distance category for races: '5K', '10K', 'Half Marathon', 
          'Marathon', 'Ultra'. NULL for non-race activities.
        data_tests:
          - accepted_values:
              arguments:
                values: ["5K", "10K", "Half Marathon", "Marathon", "Ultra"]
              config:
                severity: warn
                where: "race_distance_category IS NOT NULL"

      - name: pace_zone
        description: >
          Pace category: 'elite' (< 4:00/km), 'fast' (4:00-5:00), 
          'moderate' (5:00-6:00), 'easy' (6:00-7:00), 'recovery' (> 7:00)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["elite", "fast", "moderate", "easy", "recovery", "no_data"]

      - name: hr_zone
        description: >
          Heart rate training zone (zone 1-5).
          Based on simplified absolute HR values.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "zone_1_recovery"
                  - "zone_2_base"
                  - "zone_3_tempo"
                  - "zone_4_threshold"
                  - "zone_5_max"
                  - "no_hr_data"

      - name: effort_level
        description: >
          Overall effort level combining pace and HR: 'easy', 'moderate', 'hard'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["easy", "moderate", "hard", "unknown"]

      - name: terrain_type
        description: >
          Terrain classification based on elevation gain:
          'flat' (< 50m), 'rolling' (50-150m), 'hilly' (150-300m), 
          'mountainous' (> 300m)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["flat", "rolling", "hilly", "mountainous", "unknown"]

      - name: time_of_day
        description: >
          When activity occurred: 'morning' (5-11), 'afternoon' (12-17),
          'evening' (18-21), 'night' (22-4)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["morning", "afternoon", "evening", "night"]

      - name: is_weekend
        description: Boolean flag - TRUE if activity on Saturday or Sunday
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      # ===== Data Quality Flags =====
      - name: has_data_quality_issues
        description: >
          Flag for activities with missing critical data 
          (zero distance or duration)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_very_short
        description: Flag for activities under 5 minutes (likely errors)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: has_unrealistic_pace
        description: Flag for unrealistic pace (< 3 or > 15 min/km)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      # ===== Audit Fields =====
      - name: loaded_at
        description: Timestamp when data was loaded into bronze layer
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp of last update

  # ---------------------------------------------------------------------------
  # Model: stg_garmin_health
  # ---------------------------------------------------------------------------
  - name: stg_garmin_health
    description: >
      Cleaned and standardized Garmin daily health data from bronze layer.

      This staging model transforms raw daily health metrics into analytics-ready format:
      - Converts sleep/duration fields from seconds to hours
      - Converts daily distance from meters to kilometers
      - Adds date dimensions (day of week, week number, month, weekend flag)
      - Calculates derived metrics (sleep efficiency, total calories, body battery net)
      - Categorizes sleep quality, stress levels, body battery, and HRV
      - Computes a composite recovery score (0-100)

      Grain: One row per calendar day

      Materialization: VIEW (fast to rebuild, feeds marts)

      Upstream: source.garmin.raw_garmin_daily_health

      Downstream:
        - mart_health_trends
        - mart_ai_features

    meta:
      owner: jeremy
      layer: silver
      domain: health_recovery

    columns:
      # ===== Identifier =====
      - name: health_date
        description: Calendar date for this daily health summary (DATE)
        data_tests:
          - unique
          - not_null

      # ===== Date Dimensions =====
      - name: day_of_week
        description: Day of week (0=Sunday, 1=Monday, ..., 6=Saturday)

      - name: week_of_year
        description: ISO week number (1-53)

      - name: month_number
        description: Month number (1-12)

      - name: year_number
        description: Four-digit year

      - name: is_weekend
        description: TRUE if health_date falls on Saturday or Sunday
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      # ===== Steps & Movement =====
      - name: steps
        description: Total steps walked/run during the day (0 when no data)
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: daily_distance_km
        description: Total distance moved in kilometers (from steps + activities)
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: steps_goal_met
        description: TRUE if 10,000+ steps were recorded
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      # ===== Calories =====
      - name: active_calories
        description: Calories burned through activity (excludes BMR)

      - name: bmr_calories
        description: Basal Metabolic Rate calories (resting)

      - name: total_calories
        description: Total daily calories (active + BMR)

      # ===== Heart Rate =====
      - name: resting_heart_rate
        description: Resting heart rate in bpm (lower = better fitness)

      - name: min_heart_rate
        description: Lowest heart rate of the day (usually nocturnal)

      - name: max_heart_rate
        description: Highest heart rate of the day

      - name: has_missing_hr
        description: TRUE if resting heart rate data is unavailable
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      # ===== HRV =====
      - name: hrv_avg
        description: Average HRV in milliseconds (higher = better recovery)

      - name: hrv_status
        description: >
          Garmin's HRV classification (balanced, unbalanced, low, poor).
          NULL when HRV data is unavailable.

      - name: hrv_category
        description: >
          HRV quality bucket: 'excellent' (>= 60ms), 'good' (40-59ms),
          'moderate' (20-39ms), 'low' (< 20ms), 'no_data'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["excellent", "good", "moderate", "low", "no_data"]

      # ===== Sleep (hours) =====
      - name: sleep_hours
        description: Total sleep duration in hours
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: deep_sleep_hours
        description: Duration of deep (slow-wave) sleep in hours

      - name: light_sleep_hours
        description: Duration of light sleep in hours

      - name: rem_sleep_hours
        description: Duration of REM sleep in hours

      - name: awake_hours
        description: Time spent awake during sleep period in hours

      - name: sleep_efficiency_pct
        description: >
          Percentage of time-in-bed actually spent asleep.
          sleep_seconds / (sleep_seconds + awake_seconds) × 100.
          NULL if no sleep data.

      - name: deep_sleep_pct
        description: Deep sleep as a percentage of total sleep time

      - name: rem_sleep_pct
        description: REM sleep as a percentage of total sleep time

      - name: sleep_quality
        description: >
          Sleep quality bucket based on total hours:
          'poor' (< 5h), 'fair' (5-6h), 'good' (6-7h), 'excellent' (>= 7h), 'no_data'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["poor", "fair", "good", "excellent", "no_data"]

      - name: has_missing_sleep
        description: TRUE if sleep data is unavailable for this day
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      # ===== Stress =====
      - name: stress_avg
        description: Average daily stress score (0-100)

      - name: stress_category
        description: >
          Stress level bucket: 'low' (0-25), 'moderate' (26-50),
          'high' (51-75), 'very_high' (> 75), 'no_data'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["low", "moderate", "high", "very_high", "no_data"]

      # ===== Body Battery =====
      - name: body_battery_charged
        description: Body Battery gained during the day (rest/sleep)

      - name: body_battery_drained
        description: Body Battery lost during the day (activity/stress)

      - name: body_battery_high
        description: Highest Body Battery level during the day (0-100)

      - name: body_battery_low
        description: Lowest Body Battery level during the day (0-100)

      - name: body_battery_net
        description: >
          Net Body Battery change (charged - drained).
          Positive = net recovery day; negative = net fatigue day.

      - name: body_battery_status
        description: >
          Peak energy level bucket: 'high' (>= 75), 'moderate' (50-74),
          'low' (25-49), 'depleted' (< 25), 'no_data'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["high", "moderate", "low", "depleted", "no_data"]

      # ===== Respiration =====
      - name: avg_waking_respiration_rate
        description: Average breaths per minute while awake

      - name: avg_sleep_respiration_rate
        description: Average breaths per minute during sleep

      # ===== Composite Score =====
      - name: recovery_score
        description: >
          Composite recovery score (0-100) combining sleep, stress,
          body battery, and resting heart rate. Higher = better recovered.
          Use for trends, not as an absolute clinical measure.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "BETWEEN 0 AND 100"

      # ===== Audit Fields =====
      - name: loaded_at
        description: Timestamp when record was loaded into bronze layer
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp of last update

  # ---------------------------------------------------------------------------
  # Model: stg_garmin_calendar_events
  # ---------------------------------------------------------------------------
  - name: stg_garmin_calendar_events
    description: >
      Cleaned calendar race events from the Garmin Connect calendar.
      Includes both past and upcoming races the user has registered for.
      Grain: one row per unique race event.

    meta:
      owner: jeremy
      layer: silver
      domain: race_planning

    columns:
      - name: event_uuid
        description: Garmin's stable UUID for the event (primary key)
        data_tests:
          - unique
          - not_null

      - name: title
        description: Full event name from Garmin Connect
        data_tests:
          - not_null

      - name: event_date
        description: Race date
        data_tests:
          - not_null

      - name: event_year
        description: Year of the race

      - name: event_month
        description: Month of the race (1-12)

      - name: days_until_race
        description: Days from today to race date (negative = past)

      - name: is_upcoming
        description: TRUE if event_date >= today
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: race_season
        description: Season bucket (Spring / Summer / Fall / Winter)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Spring', 'Summer', 'Fall', 'Winter']

      - name: start_time
        description: Race start time as HH:MM string (can be NULL)

      - name: timezone
        description: IANA timezone of the race location

      - name: location
        description: City/country from Garmin (e.g. 'Cannes, FR')

      - name: distance_m
        description: Official race distance in metres

      - name: distance_km
        description: Official race distance in kilometres

      - name: race_distance_category
        description: Standard distance label (5K / 10K / Half Marathon / Marathon / Ultra)
        data_tests:
          - accepted_values:
              arguments:
                values: ['5K', '10K', 'Half Marathon', 'Marathon', 'Ultra']
              config:
                severity: warn
                where: "race_distance_category IS NOT NULL"

      - name: is_race
        description: Always TRUE
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true]

      - name: subscribed
        description: TRUE if user subscribed to this event on Garmin Connect

      - name: url
        description: External URL to race page

      - name: loaded_at
        description: Timestamp when record was loaded into bronze layer
        data_tests:
          - not_null

# =============================================================================
# Custom Tests (Optional - Advanced)
# =============================================================================
# You can add custom generic tests here later, such as:
# - Check that avg_heart_rate is always <= max_heart_rate
# - Validate that moving_duration <= total_duration
# - Ensure distance/duration = speed (within tolerance)
# =============================================================================
