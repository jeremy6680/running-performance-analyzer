# =============================================================================
# docker-compose-prod.yml
# Running Performance Analyzer — Production Stack (Hetzner VPS / Coolify)
#
# Services:
#   postgres           → Airflow metadata database
#   airflow-init       → One-shot: permissions fix + DB migrations + user creation
#   airflow-scheduler  → Runs DAGs on schedule
#   airflow-webserver  → Airflow UI (protected behind Coolify / Traefik)
#   streamlit          → Dashboard (public-facing)
#
# NOTE: YAML anchors (x-* / &anchor / <<: *anchor) have been intentionally
# removed. Coolify's Docker Compose parser does not support them reliably.
# Config is duplicated across Airflow services for full compatibility.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # POSTGRES — Airflow metadata database
  # NOT used by the running analytics pipeline (that uses DuckDB).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: rpa_postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    expose:
      - "5432"

  # ---------------------------------------------------------------------------
  # AIRFLOW INIT — runs once, then exits (restart: no)
  #
  # Runs as root (user: "0:0") to:
  #   1. Install extra Python packages (dbt, garminconnect, etc.)
  #   2. Fix log directory ownership (PermissionError root cause)
  #   3. Run DB migrations
  #   4. Create the admin user
  #
  # scheduler and webserver use `condition: service_completed_successfully`
  # so they never start before this service exits cleanly.
  # ---------------------------------------------------------------------------
  airflow-init:
    image: apache/airflow:2.9.2-python3.11
    container_name: rpa_airflow_init
    user: "0:0"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      PYTHONPATH: /opt/airflow/modules
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GARMIN_SESSION_FILE: /opt/airflow/data/garmin_session.json
      DUCKDB_PATH: /opt/airflow/data/running_analytics.duckdb
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/modules/ingestion
      - ./ai_engine:/opt/airflow/modules/ai_engine
      - ./dbt_project:/opt/airflow/dbt_project
      - airflow_data:/opt/airflow/data
      - ./airflow/airflow-requirements.txt:/opt/airflow/airflow-requirements.txt

    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e

        echo "==> [1/4] Installing extra Python packages..."
        pip install --quiet --no-cache-dir -r /opt/airflow/airflow-requirements.txt

        echo "==> [2/4] Fixing log directory permissions..."
        mkdir -p /opt/airflow/logs/scheduler
        mkdir -p /opt/airflow/logs/dag_processor_manager
        chown -R 50000:0 /opt/airflow/logs
        chmod -R 775 /opt/airflow/logs
        echo "    Log permissions set."

        echo "==> [3/4] Running Airflow DB migrations..."
        su -s /bin/bash airflow -c "airflow db upgrade"

        echo "==> [4/4] Creating admin user (skipped if already exists)..."
        su -s /bin/bash airflow -c "
          airflow users create \
            --username ${AIRFLOW_ADMIN_USERNAME} \
            --password ${AIRFLOW_ADMIN_PASSWORD} \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email ${AIRFLOW_ADMIN_EMAIL} \
          || echo 'User already exists — skipping.'
        "

        echo "==> Airflow initialization complete!"

    restart: "no"

    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # AIRFLOW SCHEDULER — triggers and monitors DAGs
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    image: apache/airflow:2.9.2-python3.11
    container_name: rpa_airflow_scheduler
    user: "50000:0"

    command: scheduler

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      PYTHONPATH: /opt/airflow/modules
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GARMIN_SESSION_FILE: /opt/airflow/data/garmin_session.json
      DUCKDB_PATH: /opt/airflow/data/running_analytics.duckdb

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/modules/ingestion
      - ./ai_engine:/opt/airflow/modules/ai_engine
      - ./dbt_project:/opt/airflow/dbt_project
      - airflow_data:/opt/airflow/data
      - ./airflow/airflow-requirements.txt:/opt/airflow/airflow-requirements.txt

    healthcheck:
      test:
        [
          "CMD",
          "airflow",
          "jobs",
          "check",
          "--job-type",
          "SchedulerJob",
          "--limit",
          "1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # AIRFLOW WEBSERVER — Airflow UI
  # In Coolify: attach a domain + enable basic auth via Traefik middleware.
  # ---------------------------------------------------------------------------
  airflow-webserver:
    image: apache/airflow:2.9.2-python3.11
    container_name: rpa_airflow_webserver
    user: "50000:0"

    command: webserver

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      PYTHONPATH: /opt/airflow/modules
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GARMIN_SESSION_FILE: /opt/airflow/data/garmin_session.json
      DUCKDB_PATH: /opt/airflow/data/running_analytics.duckdb

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/modules/ingestion
      - ./ai_engine:/opt/airflow/modules/ai_engine
      - ./dbt_project:/opt/airflow/dbt_project
      - airflow_data:/opt/airflow/data
      - ./airflow/airflow-requirements.txt:/opt/airflow/airflow-requirements.txt

    ports:
      - "${AIRFLOW_PORT:-8080}:8080"

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-scheduler:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # STREAMLIT — Dashboard + AI Coach
  # Built from streamlit.Dockerfile (lean image, no Airflow deps).
  # Shares the airflow_data volume to read the DuckDB file written by Airflow.
  # ---------------------------------------------------------------------------
  streamlit:
    container_name: rpa_streamlit

    build:
      context: .
      dockerfile: streamlit.Dockerfile

    ports:
      - "${STREAMLIT_PORT:-8501}:8501"

    environment:
      DUCKDB_PATH: /app/data/running_analytics.duckdb
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

    volumes:
      - airflow_data:/app/data

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: unless-stopped

# =============================================================================
# NAMED VOLUMES
# =============================================================================

volumes:
  postgres_data:
  airflow_logs:
  airflow_data:
